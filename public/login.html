<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Plly Master - Luminous</title>
    <!-- Fonts: Plus Jakarta Sans (Headings), Manrope (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (Minimal Config for Luminous Optimism) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        luminous: {
                            base: '#f6f6f8',
                            low: '#f0f1f3',
                            lowest: '#ffffff',
                            primary: '#FF5A5F',
                            primaryLight: '#FF7575',
                            text: '#2d2f31',
                            textMuted: '#5a5c5d'
                        }
                    },
                    boxShadow: {
                        'ambient': '0px 20px 40px rgba(45, 47, 49, 0.06)',
                        'glow': '0 10px 30px rgba(255, 90, 95, 0.25)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f6f6f8;
            color: #2d2f31;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Ambient Orbs for Luminous Feeling */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            animation: float 10s ease-in-out infinite;
        }

        .orb-primary {
            width: 400px;
            height: 400px;
            background: #FF5A5F;
            top: -100px;
            left: -100px;
        }

        .orb-secondary {
            width: 300px;
            height: 300px;
            background: #FF7575;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Glassmorphic Container */
        .glass-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 2rem; /* lg / md */
            padding: 3rem 2.5rem;
            box-shadow: 0px 20px 40px rgba(45, 47, 49, 0.06);
            /* Soft Lift: NO BORDERS */
        }

        /* Custom Input focused glow */
        .input-luminous {
            background-color: #f6f6f8;
            border: 1px solid rgba(172, 173, 175, 0.2); /* Ghost border */
            border-radius: 0.75rem;
            color: #2d2f31;
            font-family: 'Manrope', sans-serif;
            transition: all 0.3s ease;
        }

        .input-luminous:focus {
            outline: none;
            border-color: rgba(255, 90, 95, 0.3); /* primary 30% */
            box-shadow: 0 0 0 2px rgba(255, 90, 95, 0.15); /* 2px outer glow */
            background-color: #ffffff;
        }

        /* Tabs styling */
        .tab-btn {
            color: #5a5c5d;
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: #2d2f31;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: #FF5A5F;
            border-radius: 4px;
        }

        /* Button Gradient */
        .btn-gradient {
            background: linear-gradient(135deg, #b1202d, #ff7575);
            color: #ffffff;
            border-radius: 999px; /* full/pill */
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(255, 90, 95, 0.2);
        }

        .btn-gradient:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 90, 95, 0.3);
        }

        .btn-gradient:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .form-panel {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .form-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Messages */
        .msg {
            display: none;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            margin-top: 1.5rem;
            font-weight: 500;
            text-align: center;
        }
        .msg.show { display: block; }
        .msg.error { background: #ffefec; color: #b02500; }
        .msg.success { background: #e6f6ee; color: #007a4d; }
        .msg.pending { background: #fff5e6; color: #b35900; }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <!-- Abstract Environment -->
    <div class="orb orb-primary"></div>
    <div class="orb orb-secondary"></div>

    <div class="glass-container">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="w-14 h-14 mx-auto bg-gradient-to-tr from-[#FF5A5F] to-[#ffc2cd] rounded-[1rem] flex items-center justify-center text-white text-2xl mb-5 shadow-glow">🎵</div>
            <h1 class="font-display font-extrabold text-2xl tracking-tight text-luminous-text">Global Plly Master</h1>
            <p class="text-luminous-textMuted text-sm mt-1">The Digital Curator</p>
        </div>

        <!-- Navigation -->
        <div class="flex items-center justify-center gap-8 mb-10">
            <button class="tab-btn active text-lg" id="tab-login" onclick="switchTab('login')">Log In</button>
            <button class="tab-btn text-lg" id="tab-register" onclick="switchTab('register')">Request Access</button>
        </div>

        <!-- Login Panel -->
        <div id="panel-login" class="form-panel active">
            <div class="space-y-6">
                <div>
                    <label class="block text-[11px] font-bold text-luminous-textMuted uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="login-username" class="input-luminous w-full px-4 py-3.5" placeholder="Enter your username" autocomplete="username">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-luminous-textMuted uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="login-password" class="input-luminous w-full px-4 py-3.5" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button id="btn-login" class="btn-gradient w-full py-4 mt-4" onclick="doLogin()">Enter Studio</button>
            </div>
            <div id="login-msg" class="msg"></div>
        </div>

        <!-- Registration Panel -->
        <div id="panel-register" class="form-panel">
            <div class="space-y-5">
                <div>
                    <label class="block text-[11px] font-bold text-luminous-textMuted uppercase tracking-wider mb-2">Full Name</label>
                    <input type="text" id="reg-realname" class="input-luminous w-full px-4 py-3.5" placeholder="Your real name">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-luminous-textMuted uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="reg-username" class="input-luminous w-full px-4 py-3.5" placeholder="Alphanumeric (4+ chars)">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-luminous-textMuted uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="reg-password" class="input-luminous w-full px-4 py-3.5" placeholder="6+ characters">
                </div>
                <button id="btn-register" class="btn-gradient w-full py-4 mt-2" onclick="doRegister()">Submit Request</button>
            </div>
            <div id="register-msg" class="msg"></div>
        </div>
        
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('panel-login').classList.toggle('active', tab === 'login');
            document.getElementById('panel-register').classList.toggle('active', tab === 'register');
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        }

        window.addEventListener('load', () => {
            const token = localStorage.getItem('gpm_token');
            const role = localStorage.getItem('gpm_role');
            if (token) {
                if (role === 'admin') window.location.href = '/admin.html';
                else window.location.href = '/';
            }
        });

        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const msgEl = document.getElementById('login-msg');
            const btn = document.getElementById('btn-login');

            if (!username || !password) { showMsg(msgEl, 'error', '아이디와 비밀번호를 입력해주세요.'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Authenticating...';
            msgEl.className = 'msg';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('gpm_token', data.token);
                    localStorage.setItem('gpm_role', data.role);
                    localStorage.setItem('gpm_username', data.username);
                    localStorage.setItem('gpm_realname', data.realName);

                    showMsg(msgEl, 'success', `환영합니다, ${data.realName}님! 🎉 이동 중...`);
                    setTimeout(() => {
                        window.location.href = data.role === 'admin' ? '/admin.html' : '/';
                    }, 800);
                } else {
                    showMsg(msgEl, data.status === 'pending' ? 'pending' : 'error', data.message);
                }
            } catch (e) {
                showMsg(msgEl, 'error', '서버 연결에 실패했습니다.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Enter Studio';
            }
        }

        async function doRegister() {
            const realName = document.getElementById('reg-realname').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const msgEl = document.getElementById('register-msg');
            const btn = document.getElementById('btn-register');

            if (!realName || !username || !password) { showMsg(msgEl, 'error', '모든 항목을 입력해주세요.'); return; }
            if (username.length < 4) { showMsg(msgEl, 'error', '아이디는 4자 이상이어야 합니다.'); return; }
            if (password.length < 6) { showMsg(msgEl, 'error', '비밀번호는 6자 이상이어야 합니다.'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Submitting...';
            msgEl.className = 'msg';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, realName })
                });
                const data = await res.json();

                if (data.success) {
                    showMsg(msgEl, 'success', '🎉 가입 신청이 완료되었습니다! 승인 후 로그인 가능합니다.');
                    document.getElementById('reg-realname').value = '';
                    document.getElementById('reg-username').value = '';
                    document.getElementById('reg-password').value = '';
                } else {
                    showMsg(msgEl, 'error', data.message);
                }
            } catch (e) {
                showMsg(msgEl, 'error', '서버 연결에 실패했습니다.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Submit Request';
            }
        }

        function showMsg(el, type, text) {
            el.className = 'msg show ' + type;
            el.textContent = text;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const activePanel = document.querySelector('.form-panel.active').id;
                if (activePanel === 'panel-login') doLogin();
                else doRegister();
            }
        });
    </script>
</body>
</html>
