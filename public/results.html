<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Plly Master - Luminous Edition</title>
  <meta name="description" content="타겟 국가와 분위기를 선택하면 최적화된 Suno AI 프롬프트를 자동 생성하는 음원 제작 시스템">

  <!-- Fonts -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <!-- Google Fonts: Plus Jakarta Sans for Display, Manrope for UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'Manrope', 'sans-serif'],
            display: ['Pretendard', 'Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            luminous: {
              bg: '#0f1115',
              surfaceLow: '#1a1d24',
              surface: '#242831',
              primary: '#FF5A5F',
              primaryLight: '#FF7575',
              primaryDark: '#b1202d',
              text: '#f3f4f6',
              textMuted: '#9ca3af',
              textDarker: '#d1d5db',
              outlineFade: 'rgba(255, 255, 255, 0.1)'
            }
          },
          boxShadow: {
            'ambient': '0px 20px 40px rgba(0, 0, 0, 0.2)',
            'ambient-hover': '0px 30px 60px rgba(0, 0, 0, 0.4)',
            'glow': '0 10px 30px rgba(255, 90, 95, 0.25)',
          }
        },
      },
    }
  </script>

  <style>
    /* ═══ Scrollbar ═══ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f1115; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 90, 95, 0.6); }

    body {
      background-color: #0f1115;
      color: #f3f4f6;
      overflow: hidden;
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ═══ Sidebar ═══ */
    .app-sidebar {
      width: 260px; min-width: 260px; height: 100vh;
      background: #1a1d24;
      box-shadow: 0px 0px 40px rgba(0, 0, 0, 0.2);
      display: flex; flex-direction: column;
      z-index: 50;
    }

    .main-viewport {
      flex: 1; height: 100vh; overflow: hidden;
      display: flex;
      background-color: #0f1115;
    }

    @media (max-width: 1280px) {
      .app-sidebar { width: 220px; min-width: 220px; }
      .trends-panel { width: 320px; min-width: 290px; }
      .content-area { padding: 32px 32px; }
    }
    @media (max-width: 1024px) {
      .app-sidebar { width: 200px; min-width: 180px; }
      .trends-panel { width: 280px; min-width: 260px; }
      .content-area { padding: 24px; }
    }
    @media (max-width: 768px) {
      .app-sidebar, .trends-panel { display: none; }
      .main-viewport { overflow-y: auto; }
      .content-area { padding: 20px 16px; }
    }

    /* ═══ Trends Panel ═══ */
    .trends-panel {
      width: 400px; min-width: 360px; height: 100vh;
      background: #1a1d24;
      box-shadow: -20px 0px 40px rgba(0, 0, 0, 0.2);
      display: flex; flex-direction: column;
      overflow: hidden;
      z-index: 40;
    }
    .trends-panel-header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid #f0f1f3;
      flex-shrink: 0;
    }
    .trends-panel-body {
      flex: 1; overflow-y: auto; padding: 20px 24px;
    }
    .country-tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 700;
      color: #d1d5db; cursor: pointer; transition: all 0.2s;
      background: #242831;
    }
    .country-tab:hover { background: #2d333e; color: #f3f4f6; }
    .country-tab.active { background: rgba(255, 90, 95, 0.1); color: #FF5A5F; }

    .age-row {
      padding: 18px; border-radius: 1.25rem;
      background: #15181e;
      margin-bottom: 12px; transition: all 0.2s;
      border: 1px solid transparent;
    }
    .age-row:hover { background: #1a1d24; border-color: rgba(255, 90, 95, 0.3); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .age-row-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    
    .genre-list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; border-radius: 10px;
      cursor: pointer; transition: all 0.2s; width: 100%;
    }
    .genre-list-item:hover { background: rgba(255, 90, 95, 0.05); }
    .genre-list-item .rank { font-size: 12px; font-weight: 800; color: #6b7280; min-width: 20px; }
    .genre-list-item .rank-1 { color: #FF5A5F; }
    .genre-list-item .gname { flex: 1; font-size: 13.5px; font-weight: 700; color: #f3f4f6; }
    .genre-list-item.hot .gname { color: #fca5a5; }
    .genre-list-item.rising .gname { color: #34d399; }

    .genre-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
      background: #1a1d24; color: #d1d5db; cursor: pointer; transition: all 0.2s;
      border: 1px solid #2d333e; margin: 4px 2px;
    }
    .genre-chip:hover { background: #FF5A5F; color: #fff; border-color: #FF5A5F; }
    .genre-chip.hot { color: #fca5a5; border-color: rgba(177, 32, 45, 0.2); background: rgba(177, 32, 45, 0.05); }
    .genre-chip.rising { color: #34d399; border-color: rgba(0, 122, 77, 0.2); background: rgba(0, 122, 77, 0.05); }

    .content-area { padding: 48px 64px; flex: 1; overflow-y: auto; }

    /* ═══ Nav ═══ */
    .sidebar-section-label {
      font-size: 11px; font-weight: 800; color: #6b7280;
      padding: 0 20px; margin-bottom: 8px; margin-top: 24px;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .nav-link {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; border-radius: 12px;
      color: #d1d5db; font-weight: 700; font-size: 14px;
      transition: all 0.2s; cursor: pointer; text-decoration: none; margin: 4px 12px;
    }
    .nav-link:hover { background: #242831; color: #f3f4f6; }
    .nav-link.active {
      background: rgba(255, 90, 95, 0.1); color: #FF5A5F;
    }

    /* ═══ Input & Select ═══ */
    .input-label {
      display: block; font-size: 12px; font-weight: 800; color: #d1d5db;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .select-premium, .input-luminous, .textarea-luminous {
      background-color: #0f1115;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px; padding: 14px 16px;
      color: #f3f4f6; font-size: 14px; font-weight: 600; width: 100%;
      outline: none; transition: all 0.2s;
      font-family: 'Manrope', sans-serif;
    }
    .select-premium {
      appearance: none; cursor: pointer;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23d1d5db' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 14px center; background-repeat: no-repeat; background-size: 1.2rem;
      padding-right: 40px;
    }
    .select-premium:hover, .input-luminous:hover, .textarea-luminous:hover { background-color: #1a1d24; border-color: rgba(255, 90, 95, 0.4);
    }
    .select-premium:focus, .input-luminous:focus, .textarea-luminous:focus { background-color: #1a1d24; border-color: #FF5A5F; box-shadow: 0 0 0 3px rgba(255, 90, 95, 0.15);
    }

    /* ═══ Generate Button ═══ */
    .btn-generate {
      background: linear-gradient(135deg, #b1202d, #ff7575);
      color: white; font-weight: 800; border-radius: 999px;
      box-shadow: 0 10px 30px rgba(255, 90, 95, 0.25);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden; width: 100%;
      padding: 18px 24px; font-size: 17px;
      display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; border: none;
    }
    .btn-generate:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(255, 90, 95, 0.35); }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ═══ Glass Card ═══ */
    .glass-card {
      background: #1a1d24; border-radius: 1.5rem;
      box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.2);
      padding: 32px; transition: all 0.3s ease;
      border: 1px solid transparent; 
    }
    .glass-card:hover { box-shadow: 0px 30px 60px rgba(0, 0, 0, 0.3); }

    /* ═══ Results Area ═══ */
    .prompt-card {
      background: #1e222b; border-radius: 1.25rem;
      padding: 24px; transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .prompt-card:hover { background: #1a1d24; border-color: rgba(255, 90, 95, 0.2); box-shadow: 0 16px 32px rgba(45, 47, 49, 0.05); }
    .prompt-text {
      font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.7; color: #fca5a5;
      background: rgba(255, 90, 95, 0.1); border-radius: 12px; padding: 16px 20px;
      word-break: break-all; white-space: pre-wrap; font-weight: 500;
    }

    .btn-copy {
      background: rgba(255, 90, 95, 0.1); color: #FF5A5F; border-radius: 999px;
      padding: 8px 16px; font-weight: 800; font-size: 13px; cursor: pointer; transition: all 0.2s; border: none;
    }
    .btn-copy:hover { background: #FF5A5F; color: #ffffff; transform: translateY(-1px); }
    .btn-copy.copied { background: #e6f6ee; color: #34d399; }

    .substyle-tag {
      padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 700;
      color: #d1d5db; background: #242831; cursor: pointer; transition: all 0.2s;
    }
    .substyle-tag:hover { background: #2d333e; color: #f3f4f6; }
    .substyle-tag.active { background: rgba(255, 90, 95, 0.1); color: #FF5A5F; border: 1px solid rgba(255, 90, 95, 0.2); margin: -1px; }

    /* Highlights for Auto-selected */
    .substyle-tag.highlighted { background: rgba(255, 90, 95, 0.15); color: #ffb3b8; border: 1px solid rgba(255, 90, 95, 0.4); margin: -1px;
      animation: chipPulse 1.5s ease-in-out infinite alternate;
    }
    @keyframes chipPulse { from { box-shadow: 0 0 0 rgba(255, 90, 95, 0); } to { box-shadow: 0 0 8px rgba(255, 90, 95, 0.3); } }

    .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    /* Head Header */
    .glass-header {
      background: rgba(15, 17, 21, 0.7); backdrop-filter: blur(20px);
      border-radius: 1.5rem; padding: 24px 32px;
      box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2); margin-bottom: 32px;
    }
  </style>
</head>

<body>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay fixed inset-0 z-[9999] bg-[#0f1115] hidden flex-col items-center justify-center p-12 text-center lg:hidden">
    <div class="text-7xl mb-8" style="animation: float 6s ease-in-out infinite;">📱</div>
    <h2 class="font-display font-extrabold text-3xl text-[#f3f4f6] mb-6 uppercase tracking-tighter">Desktop Only</h2>
    <p class="text-[#f3f4f6]Darker text-lg font-medium leading-relaxed">Global Plly Master is a premium studio tool.<br>Please open on desktop for the full Luminous experience.</p>
  </div>

  <div id="toast-container" class="fixed top-8 right-8 z-[300] flex flex-col gap-4"></div>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="app-sidebar">
    <div class="p-8 pb-4">
      <div class="flex items-center gap-4 mb-4">
        <div class="w-12 h-12 rounded-[1rem] bg-gradient-to-tr from-[#FF5A5F] to-[#ffc2cd] flex items-center justify-center text-white text-2xl shadow-glow">🎵</div>
        <div>
          <h1 class="font-display font-extrabold text-lg leading-tight tracking-tight text-[#f3f4f6]">PLLY <span class="text-luminous-primary">MASTER</span></h1>
          <p class="text-[10px] text-[#f3f4f6]Muted mt-1 uppercase tracking-widest font-bold">Studio 대시보드</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto pb-6">
      <div class="sidebar-section-label">메인 컨트롤</div>
      <a class="nav-link active" href="/">
        <span class="w-6 flex justify-center text-lg">🏠</span><span>대시보드</span>
      </a>
      <a id="btn-admin-nav" class="nav-link" style="display:none;" href="/admin.html">
        <span class="w-6 flex justify-center text-lg">🛡️</span><span>관리자 모드</span>
      </a>
      <a class="nav-link" id="nav-advanced" href="/advanced.html">
        <span class="w-6 flex justify-center text-lg">⚡</span><span>고급 모드</span>
      </a>

      <div class="sidebar-section-label">인사이트</div>
      <a class="nav-link" href="/results.html" id="nav-recent-results" style="opacity:0.6;" title="Recent results">
        <span class="w-6 flex justify-center text-lg">🎵</span><span class="flex-1">최근 생성 결과</span>
        <span id="nav-results-badge" class="bg-luminous-primaryLight/10 text-luminous-primary px-2 py-0.5 rounded-full text-[10px] font-bold"></span>
      </a>
      <button class="nav-link w-full text-left" onclick="switchView('history')">
        <span class="w-6 flex justify-center text-lg">📋</span><span class="flex-1">작업 내역</span>
      </button>
      <button class="nav-link w-full text-left" onclick="switchView('trends')">
        <span class="w-6 flex justify-center text-lg">🌍</span><span class="flex-1">글로벌 트렌드</span>
      </button>

      <div class="sidebar-section-label">AI 시스템</div>
      <div class="mx-3 mt-2 p-4 rounded-2xl bg-luminous-surfaceLow border border-white">
        <div class="flex items-center gap-3">
          <div id="gemini-dot" class="w-2.5 h-2.5 rounded-full bg-slate-300" style="transition:background 0.4s;"></div>
          <div class="flex-1 min-w-0">
            <p class="text-[10px] font-bold text-[#f3f4f6]Darker uppercase tracking-wider">Gemini 연결 상태</p>
            <p id="gemini-status-text" class="text-[11px] font-semibold text-[#f3f4f6] truncate">연결 확인 중...</p>
          </div>
          <span id="gemini-icon" class="text-base">⏳</span>
        </div>
      </div>
    </nav>

    <!-- User Profile -->
    <div class="p-4 border-t border-luminous-surfaceLow">
      <div class="flex items-center gap-3 p-3 rounded-2xl hover:bg-luminous-surfaceLow transition-colors cursor-pointer group">
        <div class="w-10 h-10 rounded-full bg-luminous-text text-white flex items-center justify-center font-bold shadow-sm">👤</div>
        <div class="flex-1 min-w-0">
          <p id="user-display" class="text-sm font-bold text-[#f3f4f6] truncate">User</p>
          <p class="text-[10px] text-luminous-primary font-bold uppercase tracking-wider">루미너스 프로</p>
        </div>
        <button onclick="doLogout()" class="text-[#f3f4f6]Muted hover:text-luminous-primary p-2 rounded-full transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>
  <main class="main-viewport flex-1 flex flex-col w-full h-full relative z-0 bg-[#0f1115] min-w-0">
    <!-- Top Bar -->
    <div class="h-20 bg-[#1a1d24]/80 backdrop-blur-md border-b border-[#242831] flex items-center justify-between px-6 lg:px-10 shrink-0 z-40 sticky top-0 w-full shadow-[0px_10px_30px_rgba(45,47,49,0.03)]">
      <div class="flex items-center gap-3">
        <span class="hidden md:inline text-[#f3f4f6]Muted font-bold text-sm tracking-wide uppercase">Results</span>
        <span class="hidden md:inline text-[#d1d5db] mx-1">›</span>
        <span id="page-title" class="text-sm font-extrabold text-[#f3f4f6]">생성 결과</span>
      </div>
      <div class="flex items-center gap-2 lg:gap-3">
        <button onclick="copyAll()" class="flex items-center gap-2 px-4 lg:px-5 py-2 lg:py-2.5 rounded-full bg-[#FF5A5F]/10 text-[#FF5A5F] font-bold text-[13px] lg:text-sm hover:bg-[#FF5A5F]/20 transition-all whitespace-nowrap">
          📋 <span id="copy-all-text">전체 복사</span>
        </button>
        <button onclick="resetResults()" class="flex items-center gap-2 px-4 lg:px-5 py-2 lg:py-2.5 rounded-full bg-[#242831] text-[#f3f4f6]Muted font-bold text-[13px] lg:text-sm hover:bg-[#2d333e] hover:text-[#f3f4f6] transition-all whitespace-nowrap">
          🔄 <span class="hidden md:inline">초기화</span>
        </button>
        <a href="/" class="flex items-center gap-2 px-4 lg:px-5 py-2 lg:py-2.5 rounded-full bg-[#1a1d24] border border-[rgba(255,255,255,0.1)] text-[#f3f4f6] font-bold text-[13px] lg:text-sm hover:shadow-[0px_20px_40px_rgba(45,47,49,0.04)] transition-all whitespace-nowrap">
          🏠 <span class="hidden md:inline">대시보드</span>
        </a>
      </div>
    </div>

    <!-- Results Content -->
    <div class="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-8 lg:p-12 w-full">
      <div id="results-container" class="max-w-[1400px] mx-auto pb-24 w-full">
        <div id="loading" class="text-center py-40">
          <div class="text-5xl mb-6 animate-pulse" style="animation: float 4s ease-in-out infinite;">🎵</div>
          <p class="text-[#f3f4f6]Muted font-bold text-lg">결과를 불러오는 중...</p>
        </div>
      </div>
    </div>
  </main>
  
  <script>
    // ═══ Auth Guard ═══
    (function () {
      var token = localStorage.getItem('gpm_token');
      if (!token) { window.location.href = '/login.html'; return; }
      var name = localStorage.getItem('gpm_realname') || localStorage.getItem('gpm_username') || 'User';
      var el = document.getElementById('user-display');
      if (el) el.textContent = name;
    })();

    function doLogout() {
      if (confirm('로그아웃 하시겠습니까?')) {
        localStorage.removeItem('gpm_token');
        window.location.href = '/login.html';
      }
    }

    // ═══ Sidebar badge ═══
    (function () {
      var prev = localStorage.getItem('plly_results');
      if(prev){
        try{
          var d = JSON.parse(prev);
          var badge = document.getElementById('nav-results-badge');
          if(badge) badge.textContent = d.type==='batch' ? (d.data.length+'개') : '1개';
        }catch(e){}
      }
    })();

    // ═══ Sidebar Nav Active State ═══
    setTimeout(() => {
        document.querySelectorAll('.app-sidebar .nav-link').forEach(link => link.classList.remove('active'));
        const resultsLink = document.getElementById('nav-recent-results');
        if(resultsLink) resultsLink.classList.add('active');
    }, 50);

    // ═══ Toast ═══
    function showToast(msg, type) {
      type = type || 'info';
      var container = document.getElementById('toast-container');
      if(!container) return;
      var colors = { success: 'bg-emerald-50 text-emerald-700 border-emerald-200', error: 'bg-[#FF5A5F]/10 text-[#FF5A5F] border-[#FF5A5F]/20', info: 'bg-blue-50 text-blue-700 border-blue-200' };
      var icons = { success: '✅', error: '❌', info: 'ℹ️' };
      var t = document.createElement('div');
      t.className = 'rounded-[1rem] px-5 py-3 border flex items-center gap-3 shadow-[0px_20px_40px_rgba(45,47,49,0.06)] max-w-sm ' + (colors[type] || colors.info);
      t.style.cssText = 'transform:translateX(110%);transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);';
      t.innerHTML = '<span class="text-lg">' + (icons[type] || 'ℹ️') + '</span><span class="text-[13px] font-extrabold tracking-tight">' + msg + '</span>';
      container.appendChild(t);
      requestAnimationFrame(function () { t.style.transform = 'translateX(0)'; });
      setTimeout(function () { t.style.transform = 'translateX(110%)'; setTimeout(function () { t.remove(); }, 400); }, 3000);
    }

    // ═══ Clipboard ═══
    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); }
      catch (e) { var ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
    }

    var _copiedBatchCards = JSON.parse(localStorage.getItem('plly_copied_batch') || '{}');
    var _copiedImgCards = JSON.parse(localStorage.getItem('plly_copied_img') || '{}');

    function saveCopiedState() {
      localStorage.setItem('plly_copied_batch', JSON.stringify(_copiedBatchCards));
      localStorage.setItem('plly_copied_img', JSON.stringify(_copiedImgCards));
    }

    function renderResults() {
      var raw = localStorage.getItem('plly_results');
      if (!raw) {
        document.getElementById('results-container').innerHTML =
          '<div class="text-center py-40">' +
          '<div class="w-24 h-24 rounded-[2rem] bg-[#1a1d24] shadow-[0_20px_40px_rgba(0,0,0,0.4)] border border-[rgba(255,255,255,0.1)] flex items-center justify-center text-5xl mx-auto mb-6 opacity-80" style="animation: float 4s ease-in-out infinite;">😶</div>' +
          '<p class="text-[#f3f4f6]Muted font-bold text-lg mb-8">표시할 결과가 없습니다.</p>' +
          '<a href="/" class="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-[#FF5A5F] text-white font-extrabold text-[15px] hover:shadow-[0_10px_30px_rgba(255,90,95,0.25)] hover:-translate-y-1 transition-all">🏠 대시보드로 이동</a>' +
          '</div>';
        return;
      }
      var data = JSON.parse(raw);
      var container = document.getElementById('results-container');
      if (data.type === 'single') { renderSingle(container, data.data); }
      else if (data.type === 'batch') { renderBatch(container, data.data); }
    }

    // ── Single Result ──
    function renderSingle(container, result) {
      document.getElementById('page-title').textContent = '단일 프롬프트 결과';
      var escaped = (result.prompt.prompt || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      var m = result.music;
      var titleText = m ? (m.title || 'Untitled') : '단일 프롬프트 생성 결과';
      var mInfo = m ? '<div class="text-[11px] text-[#FF5A5F] uppercase font-bold tracking-widest mt-1">' + (m.duration||'') + '</div>' : '<p class="text-sm text-[#f3f4f6]Muted">가사 스크립트는 고급 모드에서 사용 가능합니다.</p>';

      container.innerHTML = '<div class="glass-card bg-[#1a1d24] rounded-[2rem] p-8 lg:p-12 shadow-[0_20px_40px_rgba(0,0,0,0.4)] border border-transparent hover:shadow-[0_30px_60px_rgba(45,47,49,0.08)] transition-all max-w-4xl mx-auto">' +
        '<div class="flex items-center gap-4 mb-8">' +
            '<div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-[#FF5A5F] to-[#ffc2cd] shadow-[0_10px_30px_rgba(255,90,95,0.25)] flex items-center justify-center text-2xl">✨</div>' +
            '<div><h2 class="text-2xl font-display font-extrabold text-[#f3f4f6]">' + titleText + '</h2>' + mInfo + '</div>' +
        '</div>' +
        '<div class="bg-luminous-surfaceLow p-6 rounded-2xl font-mono text-[14px] text-[#f3f4f6] mb-8 whitespace-pre-wrap leading-relaxed border border-[rgba(255,255,255,0.1)] max-h-[400px] overflow-y-auto break-words">' + escaped + '</div>' +
        '<div class="flex flex-wrap gap-4 items-center justify-end">' +
            '<button onclick="copyText(\'' + escaped.replace(/'/g, "\\'") + '\'); showToast(\'프롬프트가 복사되었습니다!\', \'success\');" class="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-[#FF5A5F] text-white font-extrabold hover:shadow-[0_10px_30px_rgba(255,90,95,0.25)] hover:-translate-y-1 transition-all">📋 프롬프트 복사하기</button>' +
        '</div>' +
        
        '<!-- Image Prompts Section -->' +
        '<div id="image-prompt-section" class="mt-12 pt-10 border-t border-[#242831]">' +
          '<div class="flex items-center gap-4 mb-6">' +
            '<div class="w-12 h-12 rounded-[1rem] bg-gradient-to-br from-fuchsia-400 to-purple-500 flex items-center justify-center text-xl shadow-[0_10px_30px_rgba(217,70,239,0.2)]">🎨</div>' +
            '<div><h3 class="text-[20px] font-display font-black text-[#f3f4f6]">이미지 및 비디오 프롬프트</h3><p class="text-xs text-[#f3f4f6]Muted font-bold mt-1 tracking-wide">결과 분석 기반 앨범 커버 및 비디오 백그라운드 프롬프트 (16:9)</p></div>' +
            '<div id="img-loading" class="ml-auto flex items-center gap-2 text-fuchsia-500 text-[13px] font-bold hidden"><div class="spinner w-4 h-4 border-2 border-fuchsia-200 border-t-fuchsia-500"></div>생성 중...</div>' +
          '</div>' +
          '<div class="flex flex-wrap gap-2 mb-6"><button class="px-5 py-2.5 rounded-full text-[13px] font-bold text-[#f3f4f6]Muted bg-[#242831] hover:bg-[#2d333e] hover:text-[#f3f4f6] transition-all img-tab active" data-tab="whisk" onclick="switchImgTab(\'whisk\')">🌀 Whisk (Pika)</button><button class="px-5 py-2.5 rounded-full text-[13px] font-bold text-[#f3f4f6]Muted bg-[#242831] hover:bg-[#2d333e] hover:text-[#f3f4f6] transition-all img-tab" data-tab="flow" onclick="switchImgTab(\'flow\')">🎬 FLOW (Video)</button><button class="px-5 py-2.5 rounded-full text-[13px] font-bold text-[#f3f4f6]Muted bg-[#242831] hover:bg-[#2d333e] hover:text-[#f3f4f6] transition-all img-tab" data-tab="grok" onclick="switchImgTab(\'grok\')">🤖 Grok (Image)</button></div>' +
          '<div id="img-prompt-list"><p class="text-[#f3f4f6]Muted text-sm font-bold animate-pulse">⏳ 프롬프트를 불러오는 중입니다...</p></div>' +
        '</div>' +

      '</div>';
      
      setTimeout(function() {
        var inp = JSON.parse(localStorage.getItem('plly_input') || '{}');
        if (window.fetchImagePrompt) fetchImagePrompt(inp.country, inp.genre, inp.mood);
      }, 300);
    }

    // ── Batch Results ──
    function renderBatch(container, results) {
      document.getElementById('page-title').textContent = results.length + '개 프롬프트 배치 결과';
      var copiedCount = Object.keys(_copiedBatchCards).length;

      var cards = results.map(function (r, i) {
        var escaped = (r.prompt || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var escapedLyrics = (r.lyrics || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var isCopied = _copiedBatchCards['batch_' + i];
        
        return '<div id="batch-card-' + i + '" class="prompt-card bg-[#1e222b] border border-[rgba(255,255,255,0.05)] rounded-[1.25rem] p-5 lg:p-6 hover:bg-[#1a1d24] hover:border-[#FF5A5F]/30 hover:shadow-[0_10px_20px_rgba(0,0,0,0.3)] transition-all ' + (isCopied ? 'opacity-70 saturate-[0.8]' : '') + '">' +
          '<div class="flex items-center justify-between mb-4">' +
            '<div class="flex items-center gap-3 w-full max-w-[50%]">' +
              '<div class="shrink-0 w-8 h-8 rounded-lg bg-[#242831] text-[#f3f4f6]Muted font-bold flex items-center justify-center text-[12px]">' + r.index + '</div>' +
              '<span class="text-[13px] lg:text-sm font-extrabold text-[#f3f4f6] truncate">' + (r.title || 'Untitled track') + '</span>' +
            '</div>' +
            '<div class="flex items-center gap-1.5 lg:gap-2 shrink-0">' +
              '<button id="copy-btn-style-' + i + '" onclick="copyBatchCard(this,' + i + ',' + r.index + ', \'style\')" class="btn-copy text-[10px] lg:text-[11px] px-2.5 py-1.5 ' + (isCopied ? 'bg-emerald-50 text-emerald-600' : 'bg-[#FF5A5F]/10 text-[#FF5A5F]') + ' font-bold rounded-full transition-all whitespace-nowrap">' + (isCopied ? '✅ 스타일' : '✨ 스타일') + '</button>' +
              '<button id="copy-btn-lyrics-' + i + '" onclick="copyBatchCard(this,' + i + ',' + r.index + ', \'lyrics\')" class="btn-copy text-[10px] lg:text-[11px] px-2.5 py-1.5 bg-[#FF5A5F]/10 text-[#FF5A5F] font-bold rounded-full transition-all whitespace-nowrap hover:bg-[#FF5A5F] hover:text-white">🎤 가사</button>' +
            '</div>' +
          '</div>' +
          '<div class="text-[10px] lg:text-[11px] text-[#FF5A5F] mb-1.5 font-bold tracking-wider uppercase">Style Prompt</div>' +
          '<div class="prompt-text mb-4 max-h-[85px] overflow-y-auto bg-[#FF5A5F]/[0.03] border border-[#FF5A5F]/10 text-[#f3f4f6] text-[12px] lg:text-[13px] leading-relaxed p-3.5 lg:p-4 rounded-xl font-mono whitespace-pre-wrap break-words">' + escaped + '</div>' +
          '<div class="text-[10px] lg:text-[11px] text-[#FF5A5F] mb-1.5 font-bold tracking-wider uppercase">Full Lyrics</div>' +
          '<div class="prompt-text max-h-[140px] overflow-y-auto bg-[#FF5A5F]/[0.03] border border-[#FF5A5F]/10 text-[#f3f4f6] text-[11px] lg:text-[12px] leading-relaxed p-3.5 lg:p-4 rounded-xl font-mono whitespace-pre-wrap break-words">' + (escapedLyrics || '가사가 포함되지 않았습니다.') + '</div>' +
        '</div>';
      }).join('');

      var progressW = results.length > 0 ? (copiedCount / results.length * 100) : 0;

      container.innerHTML =
        '<div class="mb-10">' +
          '<div class="flex items-center gap-5 mb-5">' +
            '<div class="w-16 h-16 shrink-0 rounded-[1.5rem] bg-gradient-to-tr from-[#FF5A5F] to-[#ffc2cd] flex items-center justify-center text-3xl shadow-[0_10px_30px_rgba(255,90,95,0.25)]">🎯</div>' +
            '<div>' +
              '<h2 class="text-2xl lg:text-[28px] leading-tight font-display font-black text-[#f3f4f6] tracking-tight">' + results.length + '개 프롬프트 세트</h2>' +
              '<p class="text-[12px] lg:text-[13px] text-[#f3f4f6]Muted font-bold mt-1.5">이전에 생성한 스타일과 가사 내역입니다. 계속 복사해서 사용하세요.</p>' +
              '<div class="flex items-center gap-3 mt-4 max-w-[280px]"><div class="flex-1 h-2 rounded-full bg-[#e7e8ea] overflow-hidden"><div id="copy-progress-bar" class="h-full rounded-full bg-gradient-to-r from-emerald-400 to-teal-400 transition-all duration-500" style="width:' + progressW + '%"></div></div><span id="copy-progress-text" class="text-[11px] font-extrabold text-[#f3f4f6]Muted tracking-wide">' + copiedCount + '/' + results.length + ' 복사됨</span></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="grid grid-cols-1 xl:grid-cols-2 gap-4 lg:gap-6 min-w-0 w-full">' + cards + '</div>' +
        
        '<!-- Batch Image Prompts Section -->' +
        '<div id="batch-image-section" class="mt-16 pt-10 border-t border-[#242831]">' +
          '<div class="flex items-center gap-4 mb-6">' +
            '<div class="w-12 h-12 shrink-0 rounded-[1rem] bg-gradient-to-br from-fuchsia-400 to-purple-600 flex items-center justify-center text-xl shadow-[0_10px_30px_rgba(217,70,239,0.25)]">🎨</div>' +
            '<div><h2 class="text-[20px] font-display font-black text-[#f3f4f6]">이미지 및 비디오 프롬프트</h2><p class="text-xs text-[#f3f4f6]Muted font-bold mt-1">각 결과별 앨범 커버와 뮤직비디오에 사용할 AI 프롬프트 (16:9)</p></div>' +
            '<div id="batch-img-loading" class="ml-auto flex items-center gap-2 text-fuchsia-500 text-[13px] font-bold hidden"><div class="spinner w-4 h-4 border-2 border-fuchsia-200 border-t-fuchsia-500"></div>생성 중...</div>' +
          '</div>' +
          '<div class="flex flex-wrap gap-2 mb-6"><button class="px-5 py-2.5 rounded-full text-[13px] font-bold text-[#f3f4f6]Muted bg-[#242831] hover:bg-[#2d333e] hover:text-[#f3f4f6] transition-all img-tab active" data-tab="whisk" onclick="switchBatchImgTab(\'whisk\')">🌀 Whisk</button><button class="px-5 py-2.5 rounded-full text-[13px] font-bold text-[#f3f4f6]Muted bg-[#242831] hover:bg-[#2d333e] hover:text-[#f3f4f6] transition-all img-tab" data-tab="flow" onclick="switchBatchImgTab(\'flow\')">🎬 FLOW</button><button class="px-5 py-2.5 rounded-full text-[13px] font-bold text-[#f3f4f6]Muted bg-[#242831] hover:bg-[#2d333e] hover:text-[#f3f4f6] transition-all img-tab" data-tab="grok" onclick="switchBatchImgTab(\'grok\')">🤖 Grok</button></div>' +
          '<div id="batch-img-list"><p class="text-[#f3f4f6]Muted text-sm font-bold">⏳ 이미지 프롬프트를 불러오는 중입니다...</p></div>' +
        '</div>' +

        '<div class="text-center mt-12 mb-10">' +
          '<a href="/" class="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-[#242831] text-[#f3f4f6] font-extrabold text-[15px] hover:bg-[#2d333e] transition-all">🏠 대시보드로 돌아가기</a>' +
        '</div>';

      window._batchData = results;
      
      setTimeout(function() {
        if (window.fetchBatchImagePrompts) fetchBatchImagePrompts(results);
      }, 300);
    }

    function copyBatchCard(btn, idx, cardIndex, type) {
      if (!window._batchData || !window._batchData[idx]) return;
      var data = window._batchData[idx];
      var textToCopy = type === 'lyrics' ? (data.lyrics || '') : data.prompt;
      
      copyText(textToCopy);
      
      if (type === 'style') {
          _copiedBatchCards['batch_' + idx] = true;
          saveCopiedState();
          var card = document.getElementById('batch-card-' + idx);
          if (card) { card.classList.add('opacity-70', 'saturate-[0.8]'); }
          btn.textContent = '✅ 저장됨';
          btn.classList.add('bg-emerald-50', 'text-emerald-600');
          btn.classList.remove('bg-[#FF5A5F]/10', 'text-[#FF5A5F]');
          updateCopyProgress();
      } else {
          btn.textContent = '✅ 저장됨';
          btn.classList.add('bg-[#FF5A5F]', 'text-white');
          btn.classList.remove('bg-[#FF5A5F]/10', 'text-[#FF5A5F]');
          setTimeout(() => {
              btn.textContent = '🎤 가사';
              btn.classList.remove('bg-[#FF5A5F]', 'text-white');
              btn.classList.add('bg-[#FF5A5F]/10', 'text-[#FF5A5F]');
          }, 2000);
      }
      showToast('#' + cardIndex + ' ' + (type === 'style' ? '스타일' : '가사') + ' 복사 완료!', 'success');
    }

    function updateCopyProgress() {
      var total = (window._batchData || []).length;
      var copied = Object.keys(_copiedBatchCards).length;
      var bar = document.getElementById('copy-progress-bar');
      var text = document.getElementById('copy-progress-text');
      if (bar) bar.style.width = (total > 0 ? (copied / total * 100) : 0) + '%';
      if (text) text.textContent = copied + '/' + total + ' 복사됨';
      if (copied === total && total > 0) showToast('🎉 모든 스타일이 복사되었습니다!', 'success');
    }

    function copyAll() {
      var data = JSON.parse(localStorage.getItem('plly_results') || '{}');
      var text = '';
      if (data.type === 'batch' && data.data) { 
        text = data.data.map(function (r) { return '[#' + r.index + '] ' + r.title + '\n[Style]\n' + r.prompt + '\n\n[Lyrics]\n' + (r.lyrics||''); }).join('\n\n---\n\n'); 
      } else if (data.data) {
        text = data.data.prompt.prompt;
      }
      
      if (text) {
        copyText(text);
        var btn = document.getElementById('copy-all-text');
        btn.textContent = '복사 완료! ✅';
        setTimeout(function () { btn.textContent = '전체 복사'; }, 2000);
        showToast('전체 내용이 클립보드에 복사되었습니다!', 'success');
        
        var dLength = (data.data && data.type === 'batch') ? data.data.length : 0;
        for (var i = 0; i < dLength; i++) {
          _copiedBatchCards['batch_' + i] = true;
          var sb = document.getElementById('copy-btn-style-' + i);
          if (sb) { sb.textContent = '✅ 저장됨'; sb.classList.add('bg-emerald-50', 'text-emerald-600'); sb.classList.remove('bg-[#FF5A5F]/10', 'text-[#FF5A5F]'); }
          var card = document.getElementById('batch-card-' + i);
          if (card) card.classList.add('opacity-70', 'saturate-[0.8]'); 
        }
        saveCopiedState();
        updateCopyProgress();
      }
    }

    function resetResults() {
      if (!confirm('생성된 결과를 모두 초기화할까요?')) return;
      localStorage.removeItem('plly_results');
      localStorage.removeItem('plly_input');
      localStorage.removeItem('plly_copied_batch');
      localStorage.removeItem('plly_copied_img');
      showToast('초기화 완료!', 'success');
      setTimeout(function () { window.location.href = '/'; }, 800);
    }

    // ── Image Prompts Logic ──
    var _imgData = {}, _batchImgData = [], _currentImgTab = 'whisk', _currentBatchImgTab = 'whisk';

    function setTabStyles(tabSelector, activeTab) {
      document.querySelectorAll(tabSelector).forEach(function(b) {
        if(b.dataset.tab === activeTab) {
          b.classList.add('bg-fuchsia-50', 'text-fuchsia-600', 'border-fuchsia-200');
          b.classList.remove('bg-[#242831]', 'text-[#f3f4f6]Muted');
        } else {
          b.classList.remove('bg-fuchsia-50', 'text-fuchsia-600', 'border-fuchsia-200');
          b.classList.add('bg-[#242831]', 'text-[#f3f4f6]Muted');
        }
      });
    }

    async function fetchImagePrompt(country, genre, mood) {
      var loading = document.getElementById('img-loading');
      if (loading) loading.classList.remove('hidden');
      try {
        var apiKey = localStorage.getItem('gpm_gemini_key');
        var aiModel = localStorage.getItem('gpm_gemini_model') || 'gemini-2.0-flash';
        var res = await fetch('/api/generate-image-prompt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ country:country, genre:genre, mood:mood, apiKey:apiKey, aiModel:aiModel }) });
        var data = await res.json();
        if (data.success) { _imgData = data.data; renderImgPrompts(); }
        else { document.getElementById('img-prompt-list').innerHTML = '<p class="text-rose-500 text-sm font-bold">⚠️ ' + (data.error || '생성 실패') + '</p>'; }
      } catch (e) { document.getElementById('img-prompt-list').innerHTML = '<p class="text-rose-500 text-sm font-bold">⚠️ 이미지 프롬프트 생성 실패</p>'; }
      finally { if (loading) loading.classList.add('hidden'); }
    }

    function switchImgTab(tab) {
      _currentImgTab = tab;
      setTabStyles('#image-prompt-section .img-tab', tab);
      renderImgPrompts();
    }

    function renderImgPrompts() {
      var list = document.getElementById('img-prompt-list');
      if (!list || !_imgData || !_imgData.prompts) return;
      var prompts = _imgData.prompts[_currentImgTab] || [];
      if (prompts.length === 0) { list.innerHTML = '<p class="text-[#f3f4f6]Muted text-sm font-bold">프롬프트가 없습니다.</p>'; return; }
      var html = '';
      for (var idx = 0; idx < prompts.length; idx++) {
        var ep = prompts[idx].replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var isCopied = _copiedImgCards['img_single_' + _currentImgTab + '_' + idx];
        html += '<div class="bg-[#1a1d24] border border-[rgba(255,255,255,0.1)] rounded-[1.25rem] p-5 mb-4 shadow-[0_10px_20px_rgba(45,47,49,0.03)] group transition-all hover:border-fuchsia-200 ' + (isCopied ? 'opacity-70 saturate-[0.8]' : '') + '"><div class="flex items-center justify-between mb-2"><span class="text-xs font-bold text-fuchsia-500 uppercase tracking-widest">' + _currentImgTab + ' Option ' + (idx+1) + '</span><button id="copy-img-single-'+idx+'" onclick="copyImgSingle(this,' + idx + ')" class="btn-copy text-[11px] px-3 py-1.5 ' + (isCopied?'bg-emerald-50 text-emerald-600':'bg-fuchsia-50 text-fuchsia-600') + ' rounded-full font-bold opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">' + (isCopied?'✅ 됨':'📋 복사') + '</button></div><div class="bg-[#1e222b] rounded-xl p-4 font-mono text-[13px] text-[#f3f4f6] max-h-[150px] overflow-y-auto break-words whitespace-pre-wrap leading-relaxed">' + ep + '</div></div>';
      }
      list.innerHTML = html;
      setTabStyles('#image-prompt-section .img-tab', _currentImgTab);
    }

    function copyImgSingle(btn, idx) {
      var prompts = _imgData.prompts[_currentImgTab] || [];
      if (prompts[idx]) { 
        copyText(prompts[idx]); 
        _copiedImgCards['img_single_' + _currentImgTab + '_' + idx] = true;
        saveCopiedState();
        btn.textContent = '✅ 됨'; 
        btn.classList.add('bg-emerald-50','text-emerald-600');
        btn.classList.remove('bg-fuchsia-50','text-fuchsia-600');
        btn.parentElement.parentElement.classList.add('opacity-70', 'saturate-[0.8]');
        showToast(_currentImgTab.toUpperCase() + ' Option ' + (idx + 1) + ' 이미지 패턴 복사!', 'success'); 
      }
    }

    async function fetchBatchImagePrompts(batchResults) {
      var loading = document.getElementById('batch-img-loading');
      if (loading) loading.classList.remove('hidden');
      _batchImgData = [];
      var inp = JSON.parse(localStorage.getItem('plly_input') || '{}');
      var apiKey = localStorage.getItem('gpm_gemini_key');
      var aiModel = localStorage.getItem('gpm_gemini_model') || 'gemini-2.0-flash';
      for (var i = 0; i < batchResults.length; i++) {
        try {
          var res = await fetch('/api/generate-image-prompt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ country: inp.country || 'KR', genre: inp.genre || 'kpop', mood: inp.mood || 'party', apiKey:apiKey, aiModel:aiModel }) });
          var data = await res.json();
          _batchImgData.push({ index: batchResults[i].index, title: batchResults[i].title, data: data.success ? data.data : null });
        } catch (e) { _batchImgData.push({ index: batchResults[i].index, title: batchResults[i].title, data: null }); }
      }
      if (loading) loading.classList.add('hidden');
      renderBatchImgPrompts();
    }

    function switchBatchImgTab(tab) {
      _currentBatchImgTab = tab;
      setTabStyles('#batch-image-section .img-tab', tab);
      renderBatchImgPrompts();
    }

    function renderBatchImgPrompts() {
      var list = document.getElementById('batch-img-list');
      if (!list || _batchImgData.length === 0) return;
      window._batchImgFullPrompts = [];
      var html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-6 w-full overflow-hidden">';
      for (var i = 0; i < _batchImgData.length; i++) {
        var item = _batchImgData[i];
        if (!item.data || !item.data.prompts) { 
          html += '<div class="bg-[#242831] rounded-2xl p-4 mb-3 opacity-50"><span class="text-sm text-rose-500 font-bold">#' + item.index + ' ' + item.title + ' - 실패</span></div>'; 
          window._batchImgFullPrompts.push(''); 
          continue; 
        }
        var prompts = item.data.prompts[_currentBatchImgTab] || [];
        var fp = prompts[0] || '';
        var esc = fp.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var isCopied = _copiedImgCards['img_' + _currentBatchImgTab + '_' + i];
        
        html += '<div id="batch-img-card-'+i+'" class="bg-[#1a1d24] border border-[rgba(255,255,255,0.1)] rounded-[1.25rem] p-5 shadow-[0_10px_20px_rgba(45,47,49,0.03)] group transition-all hover:border-fuchsia-200 ' + (isCopied?'opacity-70 saturate-[0.8]':'') + ' flex flex-col min-w-0">'+
          '<div class="flex items-center gap-3 mb-3 w-full">'+
            '<div class="w-8 h-8 rounded-lg bg-fuchsia-50 text-fuchsia-500 font-bold flex shrink-0 items-center justify-center text-[11px]">' + item.index + '</div>'+
            '<span class="text-[13px] font-extrabold text-[#f3f4f6] truncate">' + item.title + '</span>'+
            '<button id="copy-batch-img-'+i+'" onclick="copyBatchImg(this,' + i + ')" class="ml-auto btn-copy text-[11px] px-3 py-1.5 ' + (isCopied?'bg-emerald-50 text-emerald-600':'bg-fuchsia-50 text-fuchsia-600') + ' rounded-full font-bold opacity-0 group-hover:opacity-100 transition-opacity shrink-0">' + (isCopied?'✅':'📋 복사') + '</button>'+
          '</div>'+
          '<div class="bg-[#1e222b] rounded-xl p-3.5 lg:p-4 font-mono text-[11px] lg:text-[12px] text-[#f3f4f6] flex-1 overflow-y-auto break-words whitespace-pre-wrap leading-relaxed max-h-[120px]">' + esc + '</div>'+
        '</div>';
        
        window._batchImgFullPrompts.push(fp);
      }
      html += '</div>';
      list.innerHTML = html;
      setTabStyles('#batch-image-section .img-tab', _currentBatchImgTab);
    }

    function copyBatchImg(btn, idx) {
      if (window._batchImgFullPrompts && window._batchImgFullPrompts[idx]) {
        copyText(window._batchImgFullPrompts[idx]);
        _copiedImgCards['img_' + _currentBatchImgTab + '_' + idx] = true;
        saveCopiedState();
        var card = document.getElementById('batch-img-card-' + idx);
        if(card) { card.classList.add('opacity-70', 'saturate-[0.8]'); }
        btn.textContent = '✅';
        btn.classList.add('bg-emerald-50','text-emerald-600');
        btn.classList.remove('bg-fuchsia-50','text-fuchsia-600');
        showToast('커버 프롬프트 복사 완료!', 'success');
      }
    }

    // Initialize
    renderResults();
  </script>
</body>
</html>
