<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - Global Plly Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            plly: { bg: '#0a0a0f', card: '#12121a', border: '#1e1e2e', accent: '#7c3aed', text: '#e2e8f0', muted: '#64748b' }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: #080810;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #080810;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(124, 58, 237, 0.3);
      border-radius: 10px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #7c3aed, #06b6d4, #f43f5e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 24px;
      transition: all 0.4s ease;
    }

    .glass-card:hover {
      border-color: rgba(124, 58, 237, 0.3);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }

    .glass-card.copied-card {
      opacity: 0.35;
      filter: grayscale(0.5);
      transform: scale(0.98);
      pointer-events: none;
      border-color: rgba(16, 185, 129, 0.3);
      position: relative;
    }

    .glass-card.copied-card::after {
      content: '✅ 복사됨';
      position: absolute;
      top: 12px;
      right: 16px;
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.4);
      color: #6ee7b7;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .prompt-box {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.8;
      color: #c4b5fd;
      white-space: pre-wrap;
      word-break: break-all;
      position: relative;
    }

    .btn-copy {
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: #a78bfa;
      border-radius: 10px;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-copy:hover {
      background: rgba(124, 58, 237, 0.3);
      color: #e2e8f0;
      transform: translateY(-1px);
    }

    .btn-copy.copied {
      background: rgba(16, 185, 129, 0.2);
      border-color: rgba(16, 185, 129, 0.4);
      color: #6ee7b7;
    }

    .tag-pill {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #a78bfa;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-block;
    }

    .tag-pill:hover {
      background: rgba(124, 58, 237, 0.25);
      color: #e2e8f0;
    }

    .meta-tag {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 12px 16px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
      animation: fadeUp 0.5s ease-out forwards;
      opacity: 0;
    }

    .batch-num {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
    }

    .img-tab {
      padding: 8px 18px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: all 0.2s;
    }

    .img-tab:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
    }

    .img-tab.active {
      background: linear-gradient(135deg, rgba(217, 70, 239, 0.2), rgba(124, 58, 237, 0.2));
      border-color: rgba(217, 70, 239, 0.4);
      color: #e879f9;
    }

    .img-prompt-box {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(217, 70, 239, 0.15);
      border-radius: 14px;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: #e879f9;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>

<body class="min-h-screen">
  <!-- Header -->
  <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#080810]/80 border-b border-white/5">
    <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
          <div
            class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-600 to-cyan-500 flex items-center justify-center text-xl shadow-lg">
            🎵</div>
          <span class="font-black text-lg uppercase tracking-tight">PLLY <span
              class="text-purple-500">MASTER</span></span>
        </a>
        <span class="text-plly-muted mx-2">›</span>
        <span id="page-title" class="text-sm font-bold text-white/80">Generated Results</span>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="copyAll()" class="btn-copy flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
          <span id="copy-all-text">전체 복사</span>
        </button>
        <button onclick="resetResults()"
          class="px-4 py-2 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm font-bold hover:bg-rose-500/20 hover:text-rose-300 transition-all flex items-center gap-2"
          title="결과 초기화">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          초기화
        </button>
        <a href="/"
          class="px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white text-sm font-bold hover:bg-white/10 transition-all flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          대시보드로 돌아가기
        </a>
      </div>
    </div>
  </header>

  <!-- Content Area -->
  <main id="results-container" class="max-w-7xl mx-auto px-8 py-12">
    <div id="loading" class="text-center py-40">
      <div class="text-5xl mb-6 animate-pulse">🎵</div>
      <p class="text-plly-muted text-lg">결과를 불러오는 중...</p>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast-container" class="fixed top-6 right-6 z-[300] flex flex-col gap-3"></div>

  <script>
    // ═══ Toast ═══
    function showToast(msg, type) {
      type = type || 'info';
      var container = document.getElementById('toast-container');
      var colors = { success: 'from-emerald-600/90 to-teal-600/90 border-emerald-500/30', error: 'from-rose-600/90 to-red-600/90 border-rose-500/30', info: 'from-purple-600/90 to-violet-600/90 border-purple-500/30' };
      var icons = { success: '✅', error: '❌', info: 'ℹ️' };
      var t = document.createElement('div');
      t.className = 'rounded-xl px-5 py-3 bg-gradient-to-r ' + (colors[type] || colors.info) + ' border flex items-center gap-3 shadow-2xl max-w-sm transform translate-x-[110%] transition-all duration-400';
      t.innerHTML = '<span class="text-lg">' + (icons[type] || 'ℹ️') + '</span><span class="text-sm text-white font-medium">' + msg + '</span>';
      container.appendChild(t);
      requestAnimationFrame(function () { t.style.transform = 'translateX(0)'; });
      setTimeout(function () { t.style.transform = 'translateX(110%)'; setTimeout(function () { t.remove(); }, 400); }, 3000);
    }

    // ═══ Clipboard ═══
    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); } catch (e) { var ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
    }

    // ═══ Copy All ═══
    function copyAll() {
      var data = JSON.parse(localStorage.getItem('plly_results') || '{}');
      var text = '';
      if (data.type === 'single' && data.data) {
        text = data.data.prompt.prompt;
      } else if (data.type === 'batch' && data.data) {
        text = data.data.map(function (r) { return '[#' + r.index + '] ' + r.title + '\n' + r.prompt; }).join('\n\n---\n\n');
      }
      if (text) {
        copyText(text);
        var btn = document.getElementById('copy-all-text');
        btn.textContent = '복사 완료! ✅';
        setTimeout(function () { btn.textContent = '전체 복사'; }, 2000);
        showToast('전체 내용이 클립보드에 복사되었습니다!', 'success');
      }
    }

    // ═══ Render ═══
    // ═══ Copied state tracking ═══
    var _copiedBatchCards = JSON.parse(localStorage.getItem('plly_copied_batch') || '{}');
    var _copiedImgCards = JSON.parse(localStorage.getItem('plly_copied_img') || '{}');

    function saveCopiedState() {
      localStorage.setItem('plly_copied_batch', JSON.stringify(_copiedBatchCards));
      localStorage.setItem('plly_copied_img', JSON.stringify(_copiedImgCards));
    }

    function resetResults() {
      if (!confirm('생성된 결과를 모두 초기화할까요?\n대시보드에서 새로 생성할 수 있습니다.')) return;
      localStorage.removeItem('plly_results');
      localStorage.removeItem('plly_input');
      localStorage.removeItem('plly_copied_batch');
      localStorage.removeItem('plly_copied_img');
      showToast('결과가 초기화되었습니다!', 'success');
      setTimeout(function () { window.location.href = '/'; }, 800);
    }

    function renderResults() {
      var raw = localStorage.getItem('plly_results');
      if (!raw) { document.getElementById('results-container').innerHTML = '<div class="text-center py-40"><div class="text-5xl mb-6">😶</div><p class="text-plly-muted text-lg mb-8">표시할 결과가 없습니다.</p><a href="/" class="px-6 py-3 rounded-xl bg-purple-600 text-white font-bold hover:bg-purple-700 transition-all">대시보드로 이동</a></div>'; return; }
      var data = JSON.parse(raw);
      var container = document.getElementById('results-container');
      if (data.type === 'single') { renderSingle(container, data.data); }
      else if (data.type === 'batch') { renderBatch(container, data.data); }
    }

    // ── Single Result ──
    function renderSingle(container, result) {
      document.getElementById('page-title').textContent = '1개 프롬프트 결과';
      var p = result.prompt;
      var m = result.music;
      var meta = p.metaTags || {};

      var titlePills = (p.titleSuggestions || []).map(function (t) { return '<span class="tag-pill" onclick="copyText(\'' + t.replace(/'/g, "\\'") + '\');showToast(\'\\"' + t + '\\" 복사됨!\',\'info\')">' + t + '</span>'; }).join(' ');

      var metaLabels = { genre: '🎸 Genre', mood: '🎭 Mood', instruments: '🎹 Instruments', tempo: '⏱️ Tempo', vocal: '🎤 Vocal', structure: '📜 Structure', region: '🌍 Region', scale: '🎼 Scale', energy: '⚡ Energy', valence: '💫 Valence' };
      var metaHTML = Object.entries(meta).map(function (entry) {
        var k = entry[0], v = entry[1];
        return '<div class="meta-tag"><p class="text-[10px] text-plly-muted font-bold uppercase tracking-wider mb-1">' + (metaLabels[k] || k) + '</p><p class="text-sm text-purple-300 font-medium">' + v + '</p></div>';
      }).join('');

      var promptEscaped = (p.prompt || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      container.innerHTML = '<div class="grid grid-cols-1 lg:grid-cols-3 gap-10">' +
        '<div class="lg:col-span-2 space-y-8">' +
        '<div class="fade-up" style="animation-delay:0.1s">' +
        '<div class="flex items-center gap-3 mb-6"><div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-purple-500 to-cyan-500 flex items-center justify-center text-2xl shadow-xl">✨</div><div><h2 class="text-3xl font-black text-white">Master Prompt</h2><p class="text-sm text-plly-muted">Suno AI에 바로 붙여넣기 하세요</p></div></div>' +
        '<div class="prompt-box text-base leading-[2]">' + promptEscaped + '</div>' +
        '<div class="flex gap-3 mt-4"><button onclick="copyText(document.querySelector(\'.prompt-box\').textContent);showToast(\'프롬프트 복사 완료!\',\'success\')" class="btn-copy flex items-center gap-2">📋 프롬프트 복사</button></div>' +
        '</div>' +
        (titlePills ? '<div class="fade-up" style="animation-delay:0.2s"><h4 class="text-xs font-black text-plly-muted uppercase tracking-widest mb-3">Title Suggestions</h4><div class="flex flex-wrap gap-2">' + titlePills + '</div></div>' : '') +
        (metaHTML ? '<div class="fade-up" style="animation-delay:0.3s"><h4 class="text-xs font-black text-plly-muted uppercase tracking-widest mb-4">Metadata</h4><div class="grid grid-cols-2 md:grid-cols-3 gap-3">' + metaHTML + '</div></div>' : '') +
        '<!-- 🎨 Image & Video Prompts -->' +
        '<div id="image-prompt-section" class="fade-up" style="animation-delay:0.4s">' +
        '<div class="flex items-center gap-3 mb-6 mt-6"><div class="w-10 h-10 rounded-xl bg-gradient-to-br from-fuchsia-500 to-purple-600 flex items-center justify-center text-xl shadow-lg">🎨</div><div><h3 class="text-xl font-black text-white">Image & Video Prompts</h3><p class="text-xs text-plly-muted">앨범 커버 및 뮤직비디오용 AI 프롬프트 (16:9)</p></div><div id="img-loading" class="ml-auto animate-pulse text-fuchsia-400 text-sm font-bold hidden">🔄 생성 중...</div></div>' +
        '<div class="flex gap-2 mb-4"><button class="img-tab active" data-tab="whisk" onclick="switchImgTab(\'whisk\')">🌀 Whisk</button><button class="img-tab" data-tab="flow" onclick="switchImgTab(\'flow\')">🎬 FLOW</button><button class="img-tab" data-tab="grok" onclick="switchImgTab(\'grok\')">🤖 Grok</button></div>' +
        '<div id="img-prompt-list"><p class="text-plly-muted text-sm animate-pulse">⏳ 이미지 프롬프트 생성 중...</p></div>' +
        '</div>' +
        '</div>' +
        '<div class="space-y-6">' +
        (m ? '<div class="glass-card fade-up" style="animation-delay:0.2s"><div class="flex items-center gap-4 mb-4"><div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-purple-500 to-rose-400 flex items-center justify-center text-3xl shadow-lg">💿</div><div><div class="font-black text-white text-lg">' + (m.title || 'Untitled') + '</div><div class="text-[10px] text-plly-muted uppercase tracking-widest mt-0.5">' + (m.duration || '') + '</div></div></div></div>' : '') +
        '<div class="glass-card fade-up text-center" style="animation-delay:0.3s"><div class="text-4xl mb-3">🚀</div><p class="text-sm text-plly-muted font-medium">이 프롬프트를 Suno AI에 붙여넣고<br>당신만의 히트곡을 제작하세요!</p><button onclick="startSunoGeneration()" class="mt-4 inline-block px-6 py-3 rounded-xl bg-gradient-to-r from-rose-500 to-orange-500 text-white font-bold text-sm hover:scale-105 transition-transform shadow-lg cursor-pointer">🚀 Suno에서 음악 생성</button><a href="https://suno.com" target="_blank" class="mt-2 inline-block px-4 py-2 rounded-lg text-purple-400 text-xs hover:text-white transition-colors">또는 직접 Suno 열기 →</a></div>' +
        '</div>' +
        '</div>';
    }

    // ── Batch Results ──
    function renderBatch(container, results) {
      document.getElementById('page-title').textContent = results.length + '개 프롬프트 배치 결과';

      var copiedCount = Object.keys(_copiedBatchCards).length;

      var cards = results.map(function (r, i) {
        var escaped = (r.prompt || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        var isCopied = _copiedBatchCards['batch_' + i];
        var cardClass = 'glass-card fade-up group' + (isCopied ? ' copied-card' : '');
        return '<div id="batch-card-' + i + '" class="' + cardClass + '" style="animation-delay:' + (0.05 * i) + 's"><div class="flex items-start gap-4"><div class="batch-num">' + r.index + '</div><div class="flex-1 min-w-0"><div class="flex items-center justify-between mb-3"><span class="text-sm font-bold text-white truncate">' + (r.title || 'Untitled') + '</span>' + (isCopied ? '' : '<button onclick="copyBatchCard(this,' + i + ',' + r.index + ')" class="btn-copy text-[11px] opacity-0 group-hover:opacity-100 transition-opacity">복사</button>') + '</div><div class="prompt-box !p-4 !text-xs !leading-relaxed">' + escaped + '</div></div></div></div>';
      }).join('');

      var progressHTML = '<div class="flex items-center gap-3 mt-2"><div class="flex-1 h-2 rounded-full bg-white/5 overflow-hidden"><div id="copy-progress-bar" class="h-full rounded-full bg-gradient-to-r from-emerald-500 to-teal-400 transition-all duration-500" style="width:' + (results.length > 0 ? (copiedCount / results.length * 100) : 0) + '%"></div></div><span id="copy-progress-text" class="text-xs font-bold text-plly-muted">' + copiedCount + '/' + results.length + ' 복사됨</span></div>';

      container.innerHTML = '<div class="mb-10 fade-up"><div class="flex items-center gap-4 mb-2"><div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-amber-500 to-red-500 flex items-center justify-center text-2xl shadow-xl">🎯</div><div><h2 class="text-3xl font-black text-white">' + results.length + '개 프롬프트 생성 완료</h2><p class="text-sm text-plly-muted">복사한 프롬프트는 어둡게 표시됩니다. 상단 [초기화] 버튼으로 리셋하세요.</p>' + progressHTML + '</div></div></div>' +
        '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">' + cards + '</div>' +
        '<!-- 🎨 Batch Image Prompts -->' +
        '<div id="batch-image-section" class="mt-12 fade-up" style="animation-delay:0.5s"><div class="flex items-center gap-3 mb-6"><div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-fuchsia-500 to-purple-600 flex items-center justify-center text-2xl shadow-xl">🎨</div><div><h2 class="text-2xl font-black text-white">Image & Video Prompts</h2><p class="text-sm text-plly-muted">각 트랙별 앨범 커버 및 뮤직비디오용 AI 프롬프트 (16:9)</p></div><div id="batch-img-loading" class="ml-auto animate-pulse text-fuchsia-400 text-sm font-bold hidden">🔄 생성 중...</div></div><div class="flex gap-2 mb-4"><button class="img-tab active" data-tab="whisk" onclick="switchBatchImgTab(\'whisk\')">🌀 Whisk</button><button class="img-tab" data-tab="flow" onclick="switchBatchImgTab(\'flow\')">🎬 FLOW</button><button class="img-tab" data-tab="grok" onclick="switchBatchImgTab(\'grok\')">🤖 Grok</button></div><div id="batch-img-list"><p class="text-plly-muted text-sm animate-pulse">⏳ 이미지 프롬프트 생성 중...</p></div></div>' +
        '<div class="text-center mt-12 fade-up" style="animation-delay:0.6s"><a href="/" class="inline-block px-8 py-4 rounded-2xl bg-gradient-to-r from-purple-600 to-violet-600 text-white font-black text-lg hover:scale-105 transition-transform shadow-2xl shadow-purple-500/20">🏠 대시보드로 돌아가기</a></div>';

      window._batchData = results;
    }

    // ═══ Batch card copy with dimming ═══
    function copyBatchCard(btn, idx, cardIndex) {
      if (!window._batchData || !window._batchData[idx]) return;
      copyText(window._batchData[idx].prompt);
      _copiedBatchCards['batch_' + idx] = true;
      saveCopiedState();
      var card = document.getElementById('batch-card-' + idx);
      if (card) {
        card.classList.add('copied-card');
        btn.style.display = 'none';
      }
      updateCopyProgress();
      showToast('#' + cardIndex + ' 프롬프트 복사! (어둡게 표시됨)', 'success');
    }

    function updateCopyProgress() {
      var total = (window._batchData || []).length;
      var copied = Object.keys(_copiedBatchCards).length;
      var bar = document.getElementById('copy-progress-bar');
      var text = document.getElementById('copy-progress-text');
      if (bar) bar.style.width = (total > 0 ? (copied / total * 100) : 0) + '%';
      if (text) text.textContent = copied + '/' + total + ' 복사됨';
      if (copied === total && total > 0) {
        showToast('🎉 모든 프롬프트가 복사되었습니다!', 'success');
      }
    }

    // ═══ Suno AI 음악 생성 ═══
    async function startSunoGeneration() {
      var raw = localStorage.getItem('plly_results');
      if (!raw) { showToast('생성할 프롬프트가 없습니다.', 'error'); return; }
      var data = JSON.parse(raw);
      var prompts = [];
      if (data.type === 'single' && data.data) {
        prompts = [{ prompt: data.data.prompt.prompt, title: (data.data.music && data.data.music.title) || 'Track 1' }];
      } else if (data.type === 'batch' && data.data) {
        prompts = data.data.map(function (r) { return { prompt: r.prompt, title: r.title || 'Track ' + r.index }; });
      }
      if (prompts.length === 0) { showToast('프롬프트가 비어있습니다.', 'error'); return; }
      showToast('Suno AI 생성 기능은 쿠키 설정 후 사용 가능합니다.', 'info');
    }

    // ═══ Image Prompt Variables ═══
    var _imgData = {};
    var _batchImgData = [];
    var _currentImgTab = 'whisk';
    var _currentBatchImgTab = 'whisk';

    // ═══ Fetch Image Prompt (Single) ═══
    async function fetchImagePrompt(country, genre, mood) {
      var loading = document.getElementById('img-loading');
      if (loading) loading.classList.remove('hidden');
      try {
        var apiKey = localStorage.getItem('gpm_gemini_key');
        var aiModel = localStorage.getItem('gpm_gemini_model') || 'gemini-2.5-flash';
        var res = await fetch('/api/generate-image-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ country: country, genre: genre, mood: mood, apiKey: apiKey, aiModel: aiModel })
        });
        var data = await res.json();
        if (data.success) { _imgData = data.data; renderImgPrompts(); }
        else { document.getElementById('img-prompt-list').innerHTML = '<p class="text-rose-400 text-sm">⚠️ ' + (data.error || '생성 실패') + '</p>'; }
      } catch (e) {
        console.error('Image prompt error:', e);
        document.getElementById('img-prompt-list').innerHTML = '<p class="text-rose-400 text-sm">⚠️ 이미지 프롬프트 생성 실패</p>';
      } finally { if (loading) loading.classList.add('hidden'); }
    }

    // ═══ Fetch Image Prompts (Batch) ═══
    async function fetchBatchImagePrompts(batchResults) {
      var loading = document.getElementById('batch-img-loading');
      if (loading) loading.classList.remove('hidden');
      _batchImgData = [];
      var inputData = JSON.parse(localStorage.getItem('plly_input') || '{}');
      var country = inputData.country || 'KR';
      var genre = inputData.genre || 'kpop';
      var mood = inputData.mood || 'party';
      var apiKey = localStorage.getItem('gpm_gemini_key');
      var aiModel = localStorage.getItem('gpm_gemini_model') || 'gemini-2.5-flash';
      for (var i = 0; i < batchResults.length; i++) {
        try {
          var res = await fetch('/api/generate-image-prompt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ country: country, genre: genre, mood: mood, apiKey: apiKey, aiModel: aiModel })
          });
          var data = await res.json();
          _batchImgData.push({ index: batchResults[i].index, title: batchResults[i].title, data: data.success ? data.data : null });
        } catch (e) {
          _batchImgData.push({ index: batchResults[i].index, title: batchResults[i].title, data: null });
        }
      }
      if (loading) loading.classList.add('hidden');
      renderBatchImgPrompts();
    }

    // ═══ Switch Image Tab (Single) ═══
    function switchImgTab(tab) {
      _currentImgTab = tab;
      document.querySelectorAll('#image-prompt-section .img-tab').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('#image-prompt-section .img-tab').forEach(function (b) { if (b.dataset.tab === tab) b.classList.add('active'); });
      renderImgPrompts();
    }

    function renderImgPrompts() {
      var list = document.getElementById('img-prompt-list');
      if (!list || !_imgData || !_imgData.prompts) return;
      var prompts = _imgData.prompts[_currentImgTab] || [];
      if (prompts.length === 0) { list.innerHTML = '<p class="text-plly-muted text-sm">프롬프트가 없습니다.</p>'; return; }
      var html = '';
      for (var idx = 0; idx < prompts.length; idx++) {
        var ep = prompts[idx].replace(/</g, '&lt;').replace(/>/g, '&gt;');
        html += '<div class="mb-3 relative group"><div class="img-prompt-box">' + ep + '</div>';
        html += '<button onclick="copyImgPrompt(this,' + idx + ')" class="absolute top-3 right-3 btn-copy text-[10px] px-3 py-1 opacity-0 group-hover:opacity-100 transition-opacity">📋 복사</button></div>';
      }
      list.innerHTML = html;
    }

    function copyImgPrompt(btn, idx) {
      var prompts = _imgData.prompts[_currentImgTab] || [];
      if (prompts[idx]) {
        copyText(prompts[idx]);
        btn.textContent = '복사됨 ✅';
        setTimeout(function () { btn.textContent = '📋 복사'; }, 1500);
        showToast(_currentImgTab.toUpperCase() + ' V' + (idx + 1) + ' 이미지 프롬프트 복사!', 'success');
      }
    }

    // ═══ Switch Image Tab (Batch) ═══
    function switchBatchImgTab(tab) {
      _currentBatchImgTab = tab;
      document.querySelectorAll('#batch-image-section .img-tab').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('#batch-image-section .img-tab').forEach(function (b) { if (b.dataset.tab === tab) b.classList.add('active'); });
      renderBatchImgPrompts();
    }

    function renderBatchImgPrompts() {
      var list = document.getElementById('batch-img-list');
      if (!list || _batchImgData.length === 0) return;
      window._batchImgFullPrompts = [];
      var html = '';
      for (var i = 0; i < _batchImgData.length; i++) {
        var item = _batchImgData[i];
        if (!item.data || !item.data.prompts) {
          html += '<div class="glass-card mb-3 opacity-50"><span class="text-sm text-rose-400">#' + item.index + ' ' + item.title + ' - 실패</span></div>';
          window._batchImgFullPrompts.push('');
          continue;
        }
        var prompts = item.data.prompts[_currentBatchImgTab] || [];
        var fp = prompts[0] || '';
        var esc = fp.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        html += '<div class="glass-card mb-3 group"><div class="flex items-center gap-3 mb-2">';
        html += '<div class="batch-num" style="width:28px;height:28px;font-size:11px;background:linear-gradient(135deg,#d946ef,#7c3aed)">' + item.index + '</div>';
        html += '<span class="text-sm font-bold text-fuchsia-300">' + item.title + '</span>';
        html += '<button onclick="copyBatchImg(this,' + i + ')" class="ml-auto btn-copy text-[10px] px-3 py-1 opacity-0 group-hover:opacity-100 transition-opacity">📋 복사</button>';
        html += '</div><div class="img-prompt-box" style="max-height:150px">' + esc + '</div></div>';
        window._batchImgFullPrompts.push(fp);
      }
      list.innerHTML = html;
    }

    function copyBatchImg(btn, idx) {
      if (window._batchImgFullPrompts && window._batchImgFullPrompts[idx]) {
        copyText(window._batchImgFullPrompts[idx]);
        _copiedImgCards['img_' + _currentBatchImgTab + '_' + idx] = true;
        saveCopiedState();
        var card = btn.closest('.glass-card');
        if (card) { card.classList.add('copied-card'); }
        showToast('#' + (idx + 1) + ' 이미지 프롬프트 복사!', 'success');
      }
    }

    // ═══ Init ═══
    renderResults();

    // Auto-generate image prompts
    setTimeout(function () {
      var raw = localStorage.getItem('plly_results');
      var inputData = JSON.parse(localStorage.getItem('plly_input') || '{}');
      if (raw && inputData.country && inputData.genre && inputData.mood) {
        var data = JSON.parse(raw);
        if (data.type === 'single') {
          fetchImagePrompt(inputData.country, inputData.genre, inputData.mood);
        } else if (data.type === 'batch' && data.data) {
          fetchBatchImagePrompts(data.data);
        }
      }
    }, 500);
  </script>
</body>
