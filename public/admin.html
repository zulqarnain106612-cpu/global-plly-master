<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Plly Master - Admin Station</title>
    <!-- Fonts: Plus Jakarta Sans (Headings), Manrope (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        luminous: {
                            bg: '#f6f6f8',
                            surfaceLow: '#f0f1f3',
                            surface: '#ffffff',
                            primary: '#FF5A5F',
                            primaryLight: '#FF7575',
                            text: '#2d2f31',
                            textMuted: '#5a5c5d',
                            outlineFade: 'rgba(172, 173, 175, 0.2)'
                        }
                    },
                    boxShadow: {
                        'ambient': '0px 20px 40px rgba(45, 47, 49, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f6f6f8; color: #2d2f31; }
        
        /* Glassmorphic Top Nav */
        header {
            background: rgba(246, 246, 248, 0.7);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(172, 173, 175, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Luminous Cards replacing 1px borders with tonal layering */
        .stat-card {
            background: #ffffff;
            border-radius: 1.5rem; /* md rounded */
            box-shadow: 0px 20px 40px rgba(45, 47, 49, 0.04);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: none;
        }

        .table-card {
            background: #ffffff;
            border-radius: 2rem; /* lg rounded */
            box-shadow: 0px 20px 40px rgba(45, 47, 49, 0.04);
            overflow: hidden;
            margin-bottom: 3rem; /* Spacing scale 12 */
        }

        /* Tables without lines */
        thead th {
            font-family: 'Manrope', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: #5a5c5d;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1.25rem 1.5rem;
            text-align: left;
            background: #f0f1f3; /* surface-container-low */
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f6f6f8;
        }

        tbody td {
            padding: 1.5rem;
            color: #2d2f31;
            font-size: 0.875rem;
            font-weight: 500;
            vertical-align: middle;
            /* White space separator instead of border */
            border-bottom: 0.75rem solid #ffffff; 
        }

        /* Buttons */
        .btn-luminous {
            background: #f0f1f3;
            color: #FF5A5F;
            border-radius: 999px;
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 0.8125rem;
            transition: all 0.2s ease;
        }
        .btn-luminous:hover {
            background: #FF5A5F;
            color: #ffffff;
        }

        .btn-action-approve {
            background: #e6f6ee;
            color: #007a4d;
            border-radius: 999px;
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 0.8125rem;
        }
        .btn-action-reject {
            background: #ffefec;
            color: #b02500;
            border-radius: 999px;
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 0.8125rem;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .badge.pending { background: #fff5e6; color: #b35900; }
        .badge.user { background: #e6f6ee; color: #007a4d; }
        .badge.admin { background: rgba(255, 90, 95, 0.1); color: #FF5A5F; }
        .badge.rejected { background: #f0f1f3; color: #5a5c5d; }

        /* Spinner & Toasts */
        .spinner {
            border: 3px solid rgba(255, 90, 95, 0.2);
            border-top-color: #FF5A5F;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            background: #ffffff;
            box-shadow: 0px 20px 40px rgba(45, 47, 49, 0.1);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(.175, .885, .32, 1.275);
            z-index: 9999;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>

<body>
    <header class="py-5 px-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-[#FF5A5F] to-[#ffc2cd] flex items-center justify-center text-white text-lg shadow-glow">🎵</div>
            <h1 class="font-display font-bold text-xl tracking-tight text-luminous-text">Global Plly Master</h1>
            <span class="bg-luminous-primaryLight/10 text-luminous-primary px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest ml-2">Admin Authority</span>
        </div>
        <div class="flex items-center gap-6">
            <span class="text-sm font-semibold text-luminous-textMuted" id="admin-name">Admin</span>
            <button class="btn-luminous" onclick="window.location.href='/'">Go to Studio</button>
            <button class="text-sm font-bold text-luminous-textMuted hover:text-luminous-text transition-colors" onclick="doLogout()">Sign Out</button>
        </div>
    </header>

    <main class="max-w-[1100px] mx-auto py-12 px-6">
        
        <!-- Stats Sequence -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-16">
            <div class="stat-card">
                <div class="w-12 h-12 rounded-xl bg-[#fff5e6] text-[#b35900] flex items-center justify-center text-xl font-bold">⏳</div>
                <div>
                    <div class="font-display font-extrabold text-3xl leading-none text-luminous-text tracking-tight" id="stat-pending">-</div>
                    <div class="text-xs font-semibold text-luminous-textMuted mt-1 uppercase tracking-wider">Pending Apps</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="w-12 h-12 rounded-xl bg-[#e6f6ee] text-[#007a4d] flex items-center justify-center text-xl font-bold">✨</div>
                <div>
                    <div class="font-display font-extrabold text-3xl leading-none text-luminous-text tracking-tight" id="stat-active">-</div>
                    <div class="text-xs font-semibold text-luminous-textMuted mt-1 uppercase tracking-wider">Active Users</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="w-12 h-12 rounded-xl bg-[#f0f1f3] text-[#5a5c5d] flex items-center justify-center text-xl font-bold">👥</div>
                <div>
                    <div class="font-display font-extrabold text-3xl leading-none text-luminous-text tracking-tight" id="stat-total">-</div>
                    <div class="text-xs font-semibold text-luminous-textMuted mt-1 uppercase tracking-wider">Total Members</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="w-12 h-12 rounded-xl bg-[#ffefec] text-[#b02500] flex items-center justify-center text-xl font-bold">🎵</div>
                <div>
                    <div class="font-display font-extrabold text-3xl leading-none text-luminous-text tracking-tight" id="stat-prompts">-</div>
                    <div class="text-xs font-semibold text-luminous-textMuted mt-1 uppercase tracking-wider">Prompts Created</div>
                </div>
            </div>
        </div>

        <!-- Pending Section -->
        <div class="flex items-center justify-between mb-6">
            <h2 class="font-display font-extrabold text-2xl text-luminous-text">Registration Queue</h2>
            <span class="text-sm font-semibold text-luminous-textMuted" id="pending-count">Loading...</span>
        </div>
        <div class="table-card" id="pending-table-wrap">
            <div class="p-12 text-center text-luminous-textMuted">
                <div class="spinner mx-auto mb-4"></div>
                <p class="font-semibold">Syncing queue data...</p>
            </div>
        </div>

        <!-- Directory Section -->
        <div class="flex items-center justify-between mt-8 mb-6">
            <h2 class="font-display font-extrabold text-2xl text-luminous-text">Member Directory</h2>
            <button class="btn-luminous" onclick="loadAllData()">Sync Records</button>
        </div>
        <div class="table-card" id="all-table-wrap">
            <div class="p-12 text-center text-luminous-textMuted">
                <div class="spinner mx-auto mb-4"></div>
                <p class="font-semibold">Syncing directory...</p>
            </div>
        </div>

    </main>

    <div id="toast"></div>

    <script>
        const token = localStorage.getItem('gpm_token');
        const role = localStorage.getItem('gpm_role');

        if (!token || role !== 'admin') {
            window.location.href = '/login.html';
        }

        document.getElementById('admin-name').textContent = localStorage.getItem('gpm_realname') || 'Administrator';

        function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }

        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'show';
            if(type === 'error') el.style.color = '#b02500';
            else el.style.color = '#2d2f31';
            setTimeout(() => el.className = '', 3000);
        }

        function roleBadge(r) {
            const map = { pending: 'Pending', user: 'Active', admin: 'Admin', rejected: 'Rejected' };
            return `<span class="badge ${r}">${map[r] || r}</span>`;
        }

        function fmt(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return '<span class="text-luminous-textMuted text-xs font-bold">' + d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + '</span>';
        }

        async function loadAllData() {
            try {
                const [usersRes, statsRes] = await Promise.all([
                    fetch('/api/admin/users', { headers: authHeaders() }),
                    fetch('/api/admin/stats', { headers: authHeaders() })
                ]);
                const users = await usersRes.json();
                const stats = await statsRes.json();

                if (stats.success) {
                    document.getElementById('stat-pending').textContent = stats.data.pending;
                    document.getElementById('stat-active').textContent = stats.data.active;
                    document.getElementById('stat-total').textContent = stats.data.total;
                    document.getElementById('stat-prompts').textContent = stats.data.prompts;
                }

                if (!users.success) { showToast('Database Error: ' + users.message, 'error'); return; }

                const pending = users.data.filter(u => u.role === 'pending');
                const all = users.data;

                document.getElementById('pending-count').textContent = `${pending.length} Waiting`;
                document.getElementById('pending-table-wrap').innerHTML = pending.length === 0
                    ? `<div class="p-16 text-center text-luminous-textMuted"><div class="text-4xl mb-4">✨</div><p class="font-bold text-lg">No pending requests.</p><p class="text-sm mt-1">Inbox zero achieved.</p></div>`
                    : `<table class="w-full"><thead><tr><th>Name</th><th>Username</th><th>Submitted</th><th>Actions</th></tr></thead><tbody class="bg-white">
              ${pending.map(u => `<tr>
                <td class="font-bold text-base">${u.real_name}</td>
                <td><span class="bg-luminous-surfaceLow text-luminous-text px-2 py-1 rounded-md text-xs font-mono font-bold">${u.username}</span></td>
                <td>${fmt(u.created_at)}</td>
                <td class="space-x-2">
                  <button class="btn-action-approve transition hover:-translate-y-0.5" onclick="approveUser('${u.id}', '${u.real_name}')">Approve</button>
                  <button class="btn-action-reject transition hover:-translate-y-0.5" onclick="rejectUser('${u.id}', '${u.real_name}')">Decline</button>
                </td>
              </tr>`).join('')}
            </tbody></table>`;

                document.getElementById('all-table-wrap').innerHTML = all.length === 0
                    ? `<div class="p-16 text-center text-luminous-textMuted"><p class="font-bold">No active members.</p></div>`
                    : `<table class="w-full"><thead><tr><th>Name</th><th>Username</th><th>Status</th><th>Registered</th><th>Approved</th></tr></thead><tbody class="bg-white">
              ${all.map(u => `<tr>
                <td class="font-bold text-base">${u.real_name}</td>
                <td><span class="bg-luminous-surfaceLow text-luminous-text px-2 py-1 rounded-md text-xs font-mono font-bold">${u.username}</span></td>
                <td>${roleBadge(u.role)}</td>
                <td>${fmt(u.created_at)}</td>
                <td>${fmt(u.approved_at)}</td>
              </tr>`).join('')}
            </tbody></table>`;

            } catch (e) {
                showToast('Network synchronization failed.', 'error');
            }
        }

        async function approveUser(id, name) {
            try {
                const res = await fetch(`/api/admin/users/${id}/approve`, { method: 'PUT', headers: authHeaders() });
                const data = await res.json();
                if (data.success) { showToast(`Activated ${name}.`); loadAllData(); }
                else showToast(data.message, 'error');
            } catch (e) { showToast('Action failed.', 'error'); }
        }

        async function rejectUser(id, name) {
            try {
                const res = await fetch(`/api/admin/users/${id}/reject`, { method: 'PUT', headers: authHeaders() });
                const data = await res.json();
                if (data.success) { showToast(`Declined ${name}.`); loadAllData(); }
                else showToast(data.message, 'error');
            } catch (e) { showToast('Action failed.', 'error'); }
        }

        function doLogout() {
            localStorage.removeItem('gpm_token');
            localStorage.removeItem('gpm_role');
            localStorage.removeItem('gpm_username');
            localStorage.removeItem('gpm_realname');
            window.location.href = '/login.html';
        }

        loadAllData();
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
